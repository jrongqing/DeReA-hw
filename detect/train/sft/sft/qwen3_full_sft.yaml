### model
model_name_or_path: /data/shared/Qwen3-8B/
trust_remote_code: true
# add_tokens: "|<exp_start>|,|<exp_end>|,|<figurative>|,|<literal>|,|<musk>|"


### method
stage: sft
do_train: truealpaca_en_demo
finetuning_type: full
deepspeed: slang/slangRL/detect/train/sft_idiom/deepseed/sd_z3_config.json  # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]

### dataset
dataset: detect_sft  #数据集
template: qwen3_nothink
cutoff_len: 2048
# max_samples: 1000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: slang/slangRL/detect/train/sft_idiom/save_model
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: swanlab  # choices: [none, wandb, tensorboard, swanlab, mlflow]

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 1
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
# resume_from_checkpoint: null


